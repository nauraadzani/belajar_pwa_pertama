<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#601515" />
    <link rel="icon" href="icons/icon-192x192-A.png" type="image/png" />
    <!-- icon ref untuk  memaggil ikonnyaa -->
     <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>TaskFlow - Kelola Tugas Anda</title>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">✓</div>
                <h1 class="text-judul">TaskFlow</h1>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span>📝</span>
                    <span>Total: <span class="stat-number" id="totalTasks">0</span></span>
                </div>
                <div class="stat-item">
                    <span>✅</span>
                    <span>Selesai: <span class="stat-number" id="completedTasks">0</span></span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Tambahkan tugas baru..."
                    onkeypress="if(event.key==='Enter') addTask()" />
                <button class="btn btn-primary" onclick="addTask()">
                    <span>➕</span>
                    <span>Tambah</span>
                </button>
            </div>
            <div class="priority-selector">
                <button class="priority-btn high" onclick="setPriority('high')">🔴 Tinggi</button>
                <button class="priority-btn medium active" onclick="setPriority('medium')">🟡 Sedang</button>
                <button class="priority-btn low" onclick="setPriority('low')">🟢 Rendah</button>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" onclick="filterTasks('all')">Semua</button>
            <button class="filter-tab" onclick="filterTasks('active')">Aktif</button>
            <button class="filter-tab" onclick="filterTasks('completed')">Selesai</button>
            <button class="filter-tab" onclick="filterTasks('high')">🔴 Prioritas Tinggi</button>
            <button class="filter-tab" onclick="filterTasks('medium')">🟡 Prioritas Sedang</button>
            <button class="filter-tab" onclick="filterTasks('low')">🟢 Prioritas Rendah</button>
        </div>

        <div class="tasks-list" id="tasksList"></div>
    </div>

    <script>
        let tasks = [];
        let currentPriority = 'medium';
        let currentFilter = 'all';

        function loadTasks() {
            const saved = localStorage.getItem('taskflow_tasks');
            if (saved) {
                tasks = JSON.parse(saved);
                renderTasks();
            }
        }

        function saveTasks() {
            localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
        }

        function setPriority(priority) {
            currentPriority = priority;
            document.querySelectorAll('.priority-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();

            if (text === '') return;

            const task = {
                id: Date.now(),
                text: text,
                completed: false,
                priority: currentPriority,
                createdAt: new Date().toLocaleString('id-ID')
            };

            tasks.unshift(task);
            input.value = '';
            saveTasks();
            renderTasks();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');

            let filteredTasks = tasks;

            if (currentFilter === 'active') {
                filteredTasks = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(t => t.completed);
            } else if (['high', 'medium', 'low'].includes(currentFilter)) {
                filteredTasks = tasks.filter(t => t.priority === currentFilter);
            }

            if (filteredTasks.length === 0) {
                container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>Tidak ada tugas</h3>
            <p>Mulai tambahkan tugas baru untuk memulai!</p>
          </div>
        `;
            } else {
                container.innerHTML = filteredTasks.map(task => `
          <div class="task-item ${task.priority}">
            <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
              ${task.completed ? '✓' : ''}
            </div>
            <div class="task-content">
              <div class="task-text ${task.completed ? 'completed' : ''}">${task.text}</div>
              <div class="task-meta">
                <span class="task-time">🕒 ${task.createdAt}</span>
                <span>📌 ${task.priority === 'high' ? 'Tinggi' : task.priority === 'medium' ? 'Sedang' : 'Rendah'}</span>
              </div>
            </div>
            <div class="task-actions">
              <button class="btn-icon btn-delete" onclick="deleteTask(${task.id})">🗑️</button>
            </div>
          </div>
        `).join('');
            }

            updateStats();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const progress = total > 0 ? (completed / total) * 100 : 0;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        loadTasks();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(() => console.log('Service Worker registered'))
                    .catch(err => console.error('Service Worker error:', err));
            });
        }
    </script>

</body>

</html>
